<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Subir Música - Sifitecha</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

    <div class="login-card">
        <div class="logo-box">
            <img src="/images/Captura_desde_2026-05-26_20-13-17-removebg-preview.png" alt="Logo">
        </div>

        <div th:if="${error}" th:text="${error}" style="color: #e74c3c; font-weight: bold; margin-bottom: 15px; text-align: center;"></div>
        <div th:if="${exito}" th:text="${exito}" style="color: #2ecc71; font-weight: bold; margin-bottom: 15px; text-align: center;"></div>

        <form th:action="@{/recursos/subir-musica}" method="post" enctype="multipart/form-data">
            <div class="input-group">
                <label>Titulo</label>
                <input type="text" name="titulo" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Genero</label>
                <input type="text" name="genero" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Autor</label>
                <input type="text" name="autor" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Fecha de lanzamiento</label>
                <input type="text" name="fechaLanzamiento" placeholder="Ej: 2026" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Album</label>
                <input type="text" name="album" required autocomplete="off">
            </div>
            
            <div style="text-align: center; margin: 15px 0;">
                <label style="background: #c2fbd7; color: green; padding: 8px 20px; border-radius: 50px; cursor: pointer; display: inline-block; font-weight: bold;">
                    Importar mp3
                    <input type="file" name="musicaMp3" accept=".mp3" required style="display: none;">
                </label>
            </div>

            <button type="submit" class="btn-submit">Subir Música</button>
        </form>
        
        <div class="register-text" style="margin-top: 15px;">
            <a href="/reservas">← Volver al Perfil</a>
        </div>
    </div>

</body>
</html>
