<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil - Reservas</title>
    <link rel="stylesheet" href="/css/Perfil-usuario.css">
</head>
<body>

    <header>
        <div class="logo">
            <img src="/images/Captura_desde_2026-05-26_20-13-17-removebg-preview.png" alt="Logo">
        </div>
        <img src="/images/Captura_desde_2026-05-26_20-13-17-removebg-preview.png" class="avatar-top" alt="Perfil">
    </header>

<div class="toolbar" style="display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 50px;">
            
            <form th:action="@{/reservas}" method="get" style="display: flex; align-items: center; gap: 5px; flex-grow: 1;">
                <input type="hidden" name="filtro" th:value="${filtroActual ?: 'todos'}">
                <input type="hidden" name="orden" th:value="${ordenActual ?: 'desc'}">
                
                <input type="text" name="buscar" th:value="${buscarActual}" class="input-buscar-oval" placeholder="Buscar por título..." style="border-radius: 50px; padding: 8px 15px; border: 1px solid #2ecc71; background: transparent; color: white;">
                <button type="submit" class="btn-icon-oval" style="background: #2ecc71; border: none; border-radius: 50px; color: white; padding: 8px 15px; cursor: pointer;">
                    <i class="fa-solid fa-magnifying-glass"></i> Buscar
                </button>
            </form>

            <a th:href="@{/reservas(buscar=${buscarActual ?: ''}, filtro=${filtroActual ?: 'todos'}, orden=${(ordenActual ?: 'desc') == 'desc' ? 'asc' : 'desc'})}" 
               class="btn-icon-oval" 
               style="background: #34495e; border-radius: 50px; color: white; padding: 8px 15px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px;">
               <i class="fa-solid" th:classappend="${(ordenActual ?: 'desc') == 'asc' ? 'fa-arrow-down-short-wide' : 'fa-arrow-up-wide-short'}"></i>
               <span>Ordenar</span>
            </a>

            <div class="filter-group" style="display: flex; background: rgba(0,0,0,0.2); border-radius: 50px; padding: 3px;">
                <a th:href="@{/reservas(buscar=${buscarActual ?: ''}, orden=${ordenActual ?: 'desc'}, filtro='todos')}" 
                   th:style="${(filtroActual ?: 'todos') == 'todos' ? 'background: #2ecc71; color: white;' : 'color: #bbb;'}"
                   style="padding: 5px 15px; border-radius: 50px; text-decoration: none; font-size: 14px; transition: 0.3s;">Todos</a>
                
                <a th:href="@{/reservas(buscar=${buscarActual ?: ''}, orden=${ordenActual ?: 'desc'}, filtro='libros')}" 
                   th:style="${(filtroActual ?: 'todos') == 'libros' ? 'background: #2ecc71; color: white;' : 'color: #bbb;'}"
                   style="padding: 5px 15px; border-radius: 50px; text-decoration: none; font-size: 14px; transition: 0.3s;">Libros</a>
                
                <a th:href="@{/reservas(buscar=${buscarActual ?: ''}, orden=${ordenActual ?: 'desc'}, filtro='musica')}" 
                   th:style="${(filtroActual ?: 'todos') == 'musica' ? 'background: #2ecc71; color: white;' : 'color: #bbb;'}"
                   style="padding: 5px 15px; border-radius: 50px; text-decoration: none; font-size: 14px; transition: 0.3s;">Música</a>
            </div>
            
            <a href="/" style="color: #2ecc71; font-size: 20px; margin-left: 10px;"><i class="fa-solid fa-house"></i></a>
        </div>

    <div class="cards-container">

        <div class="card-green" th:each="libro : ${libros}">
            <div>
                <div class="main-info" th:text="${libro.genre}">Género</div>
                <div class="footer-info">
                    Fecha de descarga: <span th:text="${#strings.substring(libro.reservation_date,0,10)}">00/00/00</span>
                </div>
            </div>
            
            <div>
                <div class="secondary-info" th:text="${libro.author}">Autor</div>
                <div class="main-info" th:text="${libro.title}">Título</div>
                <div class="secondary-info">Año: <span th:text="${libro.release_year}">2026</span></div>
                <div class="footer-info">
                    Usuario: <span th:text="${session.usuarioSesion.username}">nombre_usuario</span>
                </div>
            </div>

            <div class="desc-text" th:text="${libro.description != null ? #strings.abbreviate(libro.description, 10) : 'Desc'}">
                Desc
            </div>
        </div>

        <div class="card-green" th:each="m : ${musica}">
            <div>
                <div class="main-info" th:text="${m.artist_or_band}">Grupo</div>
                <div class="footer-info">
                    Fecha de descarga: <span th:text="${#strings.substring(m.reservation_date,0,10)}">00/00/00</span>
                </div>
            </div>
            
            <div>
                <div class="secondary-info" th:text="${m.title}">Nombre</div>
                <div class="main-info" th:text="${m.genre}">Género</div>
                <div class="secondary-info">Año: <span th:text="${m.release_year}">2026</span></div>
                <div class="footer-info">
                    Usuario: <span th:text="${session.usuarioSesion.username}">nombre_usuario</span>
                </div>
            </div>

            <div class="desc-text" style="font-size: 35px; color: #555;">
                🎵 Audio
            </div>
        </div>

    </div>
    <!-- BARRA INFERIOR DE NAVEGACIÓN FIJA CON CERRAR SESIÓN -->
    <div class="bottom-nav">
        <a href="/">Principio</a>
        <a href="/subir-musica">Subir Cancion</a>
        <a href="/subir-libro">Subir Libro</a>
        <!-- BOTÓN DE CERRAR SESIÓN INTEGRADO -->
        <a href="/logout" class="nav-logout">Cerrar Sesión 🚪</a>
    </div>
</body>
</html>
