<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Subir Música - Sifitecha</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

    <div class="login-card">
        <div class="logo-box">
            <img src="/images/Captura_desde_2026-05-26_20-13-17-removebg-preview.png" alt="Logo">
        </div>

        <h2 style="text-align: center; color: white; margin-bottom: 20px; font-family: sans-serif;">Subir Nueva Música</h2>

        <div th:if="${error}" th:text="${error}" style="color: #e74c3c; font-weight: bold; margin-bottom: 15px; text-align: center;"></div>
        <div th:if="${exito}" th:text="${exito}" style="color: #2ecc71; font-weight: bold; margin-bottom: 15px; text-align: center;"></div>

        <form th:action="@{/recursos/subir-musica}" method="post" enctype="multipart/form-data">
            
            <div class="input-group">
                <label>Título</label>
                <input type="text" name="titulo" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Género</label>
                <input type="text" name="genero" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Autor</label>
                <input type="text" name="autor" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Fecha de lanzamiento</label>
                <input type="text" name="fechaLanzamiento" placeholder="Ej: 2026" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Álbum</label>
                <input type="text" name="album" required autocomplete="off">
            </div>
            
            <div class="input-group" style="margin-top: 20px; margin-bottom: 20px;">
                <label style="margin-bottom: 8px; display: block;">Importar archivo MP3</label>
                <input type="file" name="musicaMp3" accept=".mp3" required 
                       style="background: #c2fbd7; color: #27ae60; padding: 10px; border-radius: 50px; border: none; width: 100%; cursor: pointer; font-weight: bold; box-sizing: border-box;">
            </div>

            <button type="submit" class="btn-submit">Subir Música</button>
        </form>
        
        <div class="register-text" style="margin-top: 20px; text-align: center;">
            <a th:href="@{/reservas}" style="color: #2ecc71; text-decoration: none; font-weight: bold;">← Volver al Perfil</a>
        </div>
    </div>

</body>
</html>
